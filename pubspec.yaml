name: caza
description: "Chat & Send File with your organization."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Fonts
  google_fonts: ^6.1.0

  # State & Navigation
  get: ^4.6.6

  # Backend
  supabase_flutter: ^2.3.4

  # UI
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  emoji_picker_flutter: ^2.2.0

  # Files
  file_picker: ^8.0.3
  image_picker: ^1.0.7
  open_filex: ^4.3.4
  path_provider: ^2.1.2
  path: ^1.9.1
  mime: ^1.0.5

  # Media
  video_player: ^2.8.3
  photo_view: ^0.15.0
  
  just_audio: ^0.9.36

  # Permissions
  permission_handler: ^11.3.0

  # Auth & Security
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Utils
  intl: ^0.20.2
  timeago: ^3.6.1
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/